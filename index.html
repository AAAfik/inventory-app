<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <!-- Primary meta -->
    <title>Caesar Projects</title>
    <meta name="description" content="Caesar Projects — Warehouse, Inspections & Procurement" />
    <meta name="application-name" content="Caesar" />

    <!-- Theme color for browser chrome (matches Caesar black) -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />

    <!-- PWA / Icons -->
    <link rel="icon" type="image/png" href="/caesar-logo.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Caesar" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Font: Playfair Display (Caesar brand) + Inter fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #000;
        overscroll-behavior-y: none;   /* prevent pull-to-refresh */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #f4efe4;
      }
      /* Safe area for iOS notch */
      #root {
        min-height: 100vh;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Loader shown while React loads */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: #C9A960;
        font-size: 14px;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">CAESAR</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

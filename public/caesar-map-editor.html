<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>Caesar Resort — Pool & Building Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* Light mode */
    --bg:#f5f6fa;
    --surface:#ffffff;
    --text:#1a1d2e;
    --muted:#6b7280;
    --border:#e5e7eb;
    --border-strong:#d1d5db;

    /* Brand */
    --primary:#7c5cff;
    --primary-2:#6d4ef0;
    --primary-soft:#ede9fe;

    /* Semantic */
    --c-blue:#5b8def;
    --c-cyan:#3ad0e7;
    --c-green:#26c281;
    --c-red:#f06363;
    --c-purple:#a36cf5;
    --c-orange:#f59e3a;
    --c-slate:#374151;

    --shadow-sm:0 1px 2px rgba(15,18,38,.06);
    --shadow-md:0 4px 14px rgba(15,18,38,.08);
    --shadow-lg:0 12px 32px rgba(15,18,38,.12);
    --shadow-xl:0 20px 50px rgba(15,18,38,.18);

    --safe-b:env(safe-area-inset-bottom,0px);
  }
  body.dark{
    --bg:#0f1226;
    --surface:#1a1d3a;
    --text:#e8e9f3;
    --muted:#9ca3af;
    --border:#2a2f4a;
    --border-strong:#3a4060;
    --primary-soft:#2d1f5f;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow-md:0 4px 14px rgba(0,0,0,.35);
    --shadow-lg:0 12px 32px rgba(0,0,0,.45);
    --shadow-xl:0 20px 50px rgba(0,0,0,.55);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:"Inter",ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;
    overscroll-behavior:none;touch-action:none;-webkit-font-smoothing:antialiased}
  button{font:inherit;color:inherit}

  /* Top bar */
  #bar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;gap:10px;
    padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top,0px));
    background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm)}
  #bar .logo{width:34px;height:34px;border-radius:9px;
    background:linear-gradient(135deg,var(--primary),var(--c-purple));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;
    flex:none;box-shadow:0 4px 12px rgba(124,92,255,.35);letter-spacing:-.5px}
  #bar .titleblock{display:flex;flex-direction:column;line-height:1.15;min-width:0}
  #bar .title{font-size:15px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
  #bar .sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:1px;font-weight:500}
  #bar .sub .live{width:6px;height:6px;border-radius:50%;background:var(--c-green);
    box-shadow:0 0 0 3px rgba(38,194,129,.2);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(38,194,129,.2)}50%{box-shadow:0 0 0 5px rgba(38,194,129,.08)}}
  .spacer{flex:1}

  .zoom{display:flex;align-items:center;gap:2px;background:var(--bg);border:1px solid var(--border);
    border-radius:10px;padding:3px}
  .zoom button{width:32px;height:32px;border:none;background:transparent;border-radius:7px;font-size:17px;
    cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;font-weight:600}
  .zoom button:active{background:var(--primary-soft);color:var(--primary)}
  .zoom .z{min-width:42px;text-align:center;font-size:11px;color:var(--muted);font-weight:600}
  .themeBtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--bg);
    cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text)}
  .themeBtn:active{background:var(--primary-soft);color:var(--primary)}

  /* Viewport */
  #viewport{position:fixed;inset:0;overflow:hidden;background:var(--bg);touch-action:none;cursor:grab}
  #viewport.grabbing{cursor:grabbing}
  #viewport.placing{cursor:crosshair}
  #content{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #content img{width:100%;height:100%;display:block;-webkit-user-drag:none;user-select:none}
  #pins{position:absolute;inset:0;pointer-events:none}

  /* Pins */
  .pin{position:absolute;pointer-events:auto;touch-action:none;z-index:5;transform:translate(-22px,-22px)}
  .pin .hit{position:absolute;left:0;top:0;width:44px;height:44px;border-radius:50%}
  .pin .dot{position:absolute;left:14px;top:14px;width:16px;height:16px;border-radius:50%;
    border:3px solid #fff;box-shadow:0 2px 8px rgba(15,18,38,.4)}
  .pin.pool .dot{background:var(--c-cyan)}
  .pin.bld .dot{background:var(--primary)}
  .pin.fnb .dot{background:var(--c-red)}
  .pin.office .dot{background:var(--c-slate)}
  .pin.facility .dot{background:var(--c-green)}
  .pin .lbl{position:absolute;left:38px;top:11px;font-size:12.5px;font-weight:600;line-height:1.15;color:#fff;
    padding:6px 10px;border-radius:9px;white-space:nowrap;box-shadow:0 4px 12px rgba(15,18,38,.25);letter-spacing:-.1px}
  .pin.pool .lbl{background:var(--c-cyan)}
  .pin.bld .lbl{background:var(--primary)}
  .pin.fnb .lbl{background:var(--c-red)}
  .pin.office .lbl{background:var(--c-slate)}
  .pin.facility .lbl{background:var(--c-green)}
  .pin.dragging .dot{transform:scale(1.35);box-shadow:0 0 0 5px rgba(124,92,255,.3),0 2px 8px rgba(15,18,38,.4)}
  .pin.dragging .lbl{box-shadow:0 0 0 2px rgba(124,92,255,.55),0 4px 12px rgba(15,18,38,.3)}
  .pin.locked .dot{box-shadow:0 0 0 4px rgba(245,158,58,.45),0 2px 8px rgba(15,18,38,.4)}
  .pin.locked .lbl::before{content:"🔒 ";font-size:.85em;margin-right:1px}

  /* Bottom dock */
  #dock{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + var(--safe-b));z-index:45;
    display:flex;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:6px;box-shadow:var(--shadow-lg);max-width:calc(100vw - 20px)}
  .dbtn{border:none;background:transparent;border-radius:10px;padding:10px 14px;color:var(--text);
    font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;
    white-space:nowrap;min-height:42px;transition:background .15s,color .15s,transform .1s}
  .dbtn:active{transform:scale(.96)}
  .dbtn:hover{background:var(--bg)}
  .dbtn.on{background:var(--primary-soft);color:var(--primary)}
  .dbtn.accent{background:var(--primary);color:#fff;font-weight:700;box-shadow:0 4px 12px rgba(124,92,255,.35)}
  .dbtn.accent:hover{background:var(--primary-2)}
  .dbtn .ic{font-size:14px}
  #listBadge{background:var(--c-cyan)!important;color:#fff!important;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:700;display:none}

  /* Sheets */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:48;background:var(--surface);
    border-top:1px solid var(--border);border-radius:20px 20px 0 0;box-shadow:var(--shadow-xl);
    transform:translateY(110%);transition:transform .28s cubic-bezier(.22,1,.36,1);
    padding-bottom:calc(14px + var(--safe-b));max-height:64vh;display:flex;flex-direction:column}
  .sheet.open{transform:translateY(0)}
  .sheet .grab{width:44px;height:5px;border-radius:5px;background:var(--border-strong);margin:10px auto 4px}
  .sheet h3{margin:0;padding:6px 20px 14px;font-size:17px;font-weight:700;letter-spacing:-.3px;
    display:flex;align-items:center;gap:9px;color:var(--text)}
  .sheet h3 .c{margin-left:auto;font-size:11px;font-weight:700;color:var(--primary);
    background:var(--primary-soft);padding:3px 11px;border-radius:20px}

  #listBody{overflow:auto;padding:0 14px 8px;display:flex;flex-direction:column;gap:6px}
  .chip{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:12px;cursor:pointer;
    background:var(--bg);border:1px solid var(--border);font-size:14.5px;font-weight:500;transition:all .15s}
  .chip:active{background:var(--primary-soft);border-color:var(--primary)}
  .chip .pdot{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 0 2px var(--surface)}
  .chip .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .chip .go{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .chip .chipDel{background:transparent;border:none;color:var(--c-red);font-size:22px;width:30px;height:30px;
    border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;padding:0;line-height:1}
  .chip .chipDel:active{background:rgba(240,99,99,.15)}
  .empty{font-size:13.5px;color:var(--muted);padding:20px 6px;text-align:center}
  .sec{font-size:10.5px;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);font-weight:700;padding:10px 6px 4px}

  .mItem{display:flex;align-items:center;gap:13px;padding:14px 20px;font-size:15px;font-weight:500;
    cursor:pointer;border-top:1px solid var(--border);color:var(--text);transition:background .15s}
  .mItem:active{background:var(--bg)}
  .mItem .ic{width:22px;text-align:center;font-size:16px;color:var(--muted)}
  .mItem.danger{color:var(--c-red)} .mItem.danger .ic{color:var(--c-red)}
  .ldot{display:inline-block;width:13px;height:13px;border-radius:50%;flex:none;box-shadow:0 0 0 2px var(--surface)}
  .pill{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;margin-left:auto;letter-spacing:.3px}

  /* Editor modal */
  #backdrop{position:fixed;inset:0;background:rgba(15,18,38,.45);z-index:55;backdrop-filter:blur(3px)}
  #editor{position:fixed;left:50%;top:calc(72px + env(safe-area-inset-top,0px));transform:translateX(-50%);
    z-index:60;width:min(420px,calc(100vw - 28px));background:var(--surface);
    border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-xl);padding:20px}
  #editor h4{margin:0 0 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700}
  #edName{width:100%;font-size:16px;padding:14px 14px;border-radius:12px;border:1.5px solid var(--border);
    background:var(--bg);color:var(--text);outline:none;font-weight:500;transition:border .15s,box-shadow .15s}
  #edName:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);background:var(--surface)}
  .edrow{display:flex;gap:9px;margin-top:10px}
  .edbtn{flex:1;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:12px;
    padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
  .edbtn:active{transform:scale(.97)}
  .edbtn.save{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 12px rgba(124,92,255,.3)}
  .edbtn.save:active{background:var(--primary-2)}
  .edbtn.del{background:#fef2f2;color:var(--c-red);border-color:rgba(240,99,99,.25)}
  body.dark .edbtn.del{background:rgba(240,99,99,.12)}
  [hidden]{display:none!important}

  /* Legend */
  #legend{position:fixed;left:12px;top:calc(64px + env(safe-area-inset-top,0px));z-index:35;
    display:flex;flex-wrap:wrap;gap:5px 11px;max-width:62vw;
    background:var(--surface);border:1px solid var(--border);padding:7px 12px;border-radius:11px;
    font-size:11.5px;font-weight:600;color:var(--text);box-shadow:var(--shadow-sm)}
  #legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px;
    box-shadow:0 0 0 2px var(--surface)}

  /* Toast */
  #toast{position:fixed;left:50%;top:calc(64px + env(safe-area-inset-top,0px));
    transform:translateX(-50%) translateY(-10px);z-index:70;
    background:var(--text);color:var(--surface);font-weight:600;font-size:13px;padding:10px 18px;
    border-radius:12px;opacity:0;transition:.25s;pointer-events:none;box-shadow:var(--shadow-lg)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Placing banner */
  #placingBanner{position:fixed;left:50%;top:calc(64px + env(safe-area-inset-top,0px));
    transform:translate(-50%,-130%);z-index:65;
    background:linear-gradient(135deg,var(--primary),var(--c-purple));color:#fff;font-weight:600;font-size:13px;
    padding:8px 8px 8px 16px;border-radius:12px;display:flex;align-items:center;gap:10px;
    transition:transform .25s cubic-bezier(.22,1,.36,1);box-shadow:0 12px 32px rgba(124,92,255,.45);
    max-width:calc(100vw - 24px)}
  #placingBanner.show{transform:translate(-50%,0)}
  #placingBanner .ptxt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62vw}
  #placingBanner .pcancel{background:rgba(255,255,255,.22);border:none;color:#fff;font-size:18px;
    width:26px;height:26px;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;padding:0;line-height:1;flex:none}
  #placingBanner .pcancel:active{background:rgba(255,255,255,.4)}

  input[type=file]{display:none}
  @media(max-width:600px){
    #bar .title{font-size:14px}
    #bar .sub{font-size:10px}
    .dbtn .lbltext{display:none}
    .dbtn{padding:9px 11px}
    #legend{font-size:10.5px;padding:6px 10px}
  }
/* ========= LOGIN OVERLAY ========= */
#loginOverlay{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#312e81 100%);display:flex;align-items:center;justify-content:center;z-index:99999;font-family:inherit;padding:20px}
#loginOverlay.hidden{display:none}
#loginBox{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 36px;max-width:380px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.4)}
#loginBox h2{margin:0 0 8px;color:#fff;font-size:22px;font-weight:700;text-align:center;letter-spacing:-0.02em}
#loginBox .sub{color:rgba(255,255,255,.6);font-size:13px;text-align:center;margin-bottom:28px}
#loginBox .logo{width:64px;height:64px;background:linear-gradient(135deg,#7c5cff,#3ad0e7);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 18px;box-shadow:0 8px 24px rgba(124,92,255,.4)}
#loginBox label{display:block;color:rgba(255,255,255,.7);font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;margin-top:14px}
#loginBox input{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;transition:border .15s}
#loginBox input:focus{border-color:#7c5cff;background:rgba(0,0,0,.4)}
#loginBox button{width:100%;background:linear-gradient(135deg,#7c5cff,#5b3ee0);border:none;border-radius:10px;padding:13px;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:22px;letter-spacing:0.02em;box-shadow:0 4px 14px rgba(124,92,255,.4);transition:transform .1s}
#loginBox button:active{transform:scale(.98)}
#loginErr{color:#ff6b6b;font-size:12px;text-align:center;margin-top:14px;min-height:16px}
#loginBox .hint{color:rgba(255,255,255,.4);font-size:11px;text-align:center;margin-top:18px}
</head>
<body>

<!-- ===== LOGIN OVERLAY ===== -->
<div id="loginOverlay">
  <form id="loginBox" onsubmit="return doLogin(event)">
    <div class="logo">🗺️</div>
    <h2>Caesar Resort Map</h2>
    <div class="sub">Sign in to access the map editor</div>
    <label for="loginUser">Username</label>
    <input id="loginUser" type="text" autocomplete="username" required autofocus>
    <label for="loginPass">Password</label>
    <input id="loginPass" type="password" autocomplete="current-password" required>
    <button type="submit">Sign in →</button>
    <div id="loginErr"></div>
    <div class="hint">Authorized personnel only</div>
  </form>
</div>

<script>
/* ===== USER CREDENTIALS =====
   Edit / add / remove users here.
   To add a user: add a new line like  "username":"password",
*/
const USERS = {
  "admin":      "caesar2026",
  "alireza":    "afik2026",
  "hezi":       "caesar123",
  "manager":    "manager2026",
  "maintenance":"fix2026"
};

function doLogin(ev){
  ev.preventDefault();
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  if(USERS[u] && USERS[u] === p){
    document.getElementById('loginOverlay').classList.add('hidden');
    err.textContent = '';
    // mark logged in for this tab session only — clears when tab closes
    try{ sessionStorage.setItem('caesarMapLogin', u); }catch(e){}
    return false;
  }
  err.textContent = 'Wrong username or password';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginPass').focus();
  return false;
}

// Auto-restore login within the same tab session (so reloads don't force re-login,
// but closing the tab/browser will)
(function(){
  try{
    const u = sessionStorage.getItem('caesarMapLogin');
    if(u && USERS[u]){
      document.getElementById('loginOverlay').classList.add('hidden');
    }
  }catch(e){}
})();
</script>

  <div id="bar">
    <div class="logo">C</div>
    <div class="titleblock">
      <div class="title">Caesar Resort</div>
      <div class="sub"><span class="live"></span>Pool &amp; Building Map</div>
    </div>
    <div class="spacer"></div>
    <div class="zoom">
      <button id="zo">−</button><span class="z" id="zlbl">100%</span><button id="zi">+</button>
      <button id="fit" style="font-size:12px;width:auto;padding:0 10px;font-weight:600">Fit</button>
    </div>
    <button class="themeBtn" id="themeBtn" title="Toggle theme">☾</button>
  </div>

  <div id="viewport"><div id="content"><img id="baseimg" alt="Caesar Resort aerial"/></div><div id="pins"></div></div>

  <div id="legend">
    <span><i style="background:#3ad0e7"></i>Pool</span>
    <span><i style="background:#7c5cff"></i>Building</span>
    <span><i style="background:#f06363"></i>F&amp;B</span>
    <span><i style="background:#374151"></i>Office</span>
    <span><i style="background:#26c281"></i>Facility</span>
  </div>

  <div id="dock">
    <button class="dbtn" id="openLayers"><span class="ic">◑</span><span class="lbltext">Layers</span></button>
    <button class="dbtn accent" id="openAdd"><span class="ic">＋</span><span class="lbltext">Add</span></button>
    <button class="dbtn" id="openList"><span class="ic">☰</span><span class="lbltext">List</span><span id="listBadge"></span></button>
    <button class="dbtn" id="openMenu"><span class="ic">⋯</span></button>
  </div>

  <!-- list sheet -->
  <div class="sheet" id="listSheet">
    <div class="grab"></div>
    <h3>↪ Unplaced items <span class="c" id="listCount">0</span></h3>
    <div id="listBody"></div>
  </div>

  <!-- add sheet -->
  <div class="sheet" id="addSheet">
    <div class="grab"></div>
    <h3>Add new</h3>
    <div class="mItem" id="a_pool"><i class="ldot" style="background:#3ad0e7"></i> New pool</div>
    <div class="mItem" id="a_bld"><i class="ldot" style="background:#7c5cff"></i> New building</div>
    <div class="mItem" id="a_fnb"><i class="ldot" style="background:#f06363"></i> New F&amp;B (cafe / restaurant)</div>
    <div class="mItem" id="a_office"><i class="ldot" style="background:#374151"></i> New office</div>
    <div class="mItem" id="a_facility"><i class="ldot" style="background:#26c281"></i> New facility</div>
  </div>

  <!-- layers sheet -->
  <div class="sheet" id="layersSheet">
    <div class="grab"></div>
    <h3>Layers <span style="font-size:12px;color:#9fb0cf;font-weight:500;margin-left:6px">tap to show / hide</span></h3>
    <div id="layersBody"></div>
  </div>

  <!-- menu sheet -->
  <div class="sheet" id="menuSheet">
    <div class="grab"></div>
    <h3>Options</h3>
    <div class="mItem" id="mPng"><span class="ic">⬇</span> Export image (PNG)</div>
    <div class="mItem" id="mXlsx"><span class="ic">⬇</span> Export Excel (XLSX)</div>
    <div class="mItem" id="mCsv"><span class="ic">⬇</span> Export CSV (all categories)</div>
    <div class="mItem" id="mJson"><span class="ic">⬇</span> Save data (JSON)</div>
    <div class="mItem" id="mHtml"><span class="ic">⬇</span> Download HTML (standalone)</div>
    <div class="mItem" id="mImport"><span class="ic">⬆</span> Load data (JSON)</div>
    <div class="mItem danger" id="mReset"><span class="ic">↺</span> Reset to original</div>
    <input type="file" id="importFile" accept="application/json"/>
  </div>

  <!-- editor -->
  <div id="backdrop" hidden></div>

/* ---- categories ---- */
const CATDEF=[
  {k:'pool',    prop:'pools',     label:'Pools',      dot:'#3ad0e7', box:'#3ad0e7', fs:12.5, def:'New Pool'},
  {k:'bld',     prop:'buildings', label:'Buildings',  dot:'#7c5cff', box:'#7c5cff', fs:12.5, def:'New Building'},

  {k:'facility',prop:'facility',  label:'Facilities', dot:'#26c281', box:'#26c281', fs:12.5, def:'New Facility'},
];
const CATBY={};CATDEF.forEach(c=>CATBY[c.k]=c);
const arrOf=k=>state[CATBY[k].prop];
let show={pool:true,bld:true,fnb:true,office:true,facility:true};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---- transform ---- */
const vp=document.getElementById('viewport'),content=document.getElementById('content'),pinsEl=document.getElementById('pins');
let s=1,tx=0,ty=0;
function applyT(){content.style.transform=`translate(${tx}px,${ty}px) scale(${s})`;document.getElementById('zlbl').textContent=Math.round(s*100)+'%';layoutPins();}
function fit(){const w=vp.clientWidth,h=vp.clientHeight;s=Math.min(w/IMG_W,h/IMG_H)*0.96;tx=(w-IMG_W*s)/2;ty=(h-IMG_H*s)/2;applyT();}
function fitContent(){
  const pts=[];
  CATDEF.forEach(c=>{if(show[c.k])arrOf(c.k).filter(it=>it.onMap!==false).forEach(it=>pts.push(it));});
  if(!pts.length)return fit();
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  pts.forEach(p=>{minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);});
  const padL=70,padR=190,padT=70,padB=90;
  const bw=(maxX-minX)+padL+padR, bh=(maxY-minY)+padT+padB;
  const w=vp.clientWidth,h=vp.clientHeight;
  s=clamp(Math.min(w/bw,h/bh),0.12,2.2);
  const cx=(minX-padL+maxX+padR)/2, cy=(minY-padT+maxY+padB)/2;
  tx=w/2-cx*s; ty=h/2-cy*s; applyT();
}
function zoomAt(mx,my,f){const ns=clamp(s*f,0.12,7);tx=mx-(mx-tx)*ns/s;ty=my-(my-ty)*ns/s;s=ns;applyT();}
vp.addEventListener('wheel',e=>{e.preventDefault();const r=vp.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});
document.getElementById('zi').onclick=()=>zoomAt(vp.clientWidth/2,vp.clientHeight/2,1.25);
document.getElementById('zo').onclick=()=>zoomAt(vp.clientWidth/2,vp.clientHeight/2,1/1.25);
document.getElementById('fit').onclick=fitContent;

/* pan (1 finger) + pinch (2 finger) */
let panning=false,plast=null,pinching=false,pinchD=0,activePin=null;
let panStartX=0,panStartY=0,panMoved=false;
vp.addEventListener('pointerdown',e=>{if(e.target.closest('.pin'))return;panning=true;plast={x:e.clientX,y:e.clientY};panStartX=e.clientX;panStartY=e.clientY;panMoved=false;vp.classList.add('grabbing');});
vp.addEventListener('pointermove',e=>{if(!panning||pinching||activePin)return;if(!panMoved&&Math.hypot(e.clientX-panStartX,e.clientY-panStartY)>6)panMoved=true;tx+=e.clientX-plast.x;ty+=e.clientY-plast.y;plast={x:e.clientX,y:e.clientY};applyT();});
vp.addEventListener('pointerup',e=>{if(panning&&!panMoved&&!pinching&&placingItem){placeAt(e.clientX,e.clientY);}panning=false;vp.classList.remove('grabbing');});
const endPan=()=>{panning=false;vp.classList.remove('grabbing');};
vp.addEventListener('pointerleave',endPan);vp.addEventListener('pointercancel',endPan);
vp.addEventListener('touchstart',e=>{if(e.touches.length>=2){pinching=true;panning=false;if(activePin){activePin.el.classList.remove('dragging');activePin=null;}const a=e.touches[0],b=e.touches[1];pinchD=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}},{passive:false});
vp.addEventListener('touchmove',e=>{if(e.touches.length>=2){e.preventDefault();const a=e.touches[0],b=e.touches[1];const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);const r=vp.getBoundingClientRect();const mx=(a.clientX+b.clientX)/2-r.left,my=(a.clientY+b.clientY)/2-r.top;if(pinchD)zoomAt(mx,my,d/pinchD);pinchD=d;}},{passive:false});
vp.addEventListener('touchend',e=>{if(e.touches.length<2){pinching=false;pinchD=0;if(e.touches.length===1&&!activePin){panning=true;plast={x:e.touches[0].clientX,y:e.touches[0].clientY};panStartX=plast.x;panStartY=plast.y;panMoved=false;}}});

/* ---- pins ---- */
const pinEls=[];
function place(rec){rec.el.style.left=(tx+rec.item.x*s)+'px';rec.el.style.top=(ty+rec.item.y*s)+'px';}
function layoutPins(){pinEls.forEach(place);}
function clearPins(){if(activePin){activePin.el.classList.remove('dragging');activePin=null;}pinsEl.innerHTML='';pinEls.length=0;}
function makePin(item,kind){
  const c=CATBY[kind];
  const el=document.createElement('div');el.className='pin '+kind+(item.locked?' locked':'');
  el.innerHTML='<span class="hit"></span><span class="dot"></span><span class="lbl"></span>';
  const dot=el.querySelector('.dot'),lbl=el.querySelector('.lbl');
  dot.style.background=c.dot; lbl.style.background=c.box; lbl.style.fontSize=c.fs+'px';
  lbl.textContent=item.name;
  pinsEl.appendChild(el);
  const rec={el,item,kind};pinEls.push(rec);place(rec);
  let sx,sy,moved;
  el.addEventListener('pointerdown',e=>{e.stopPropagation();activePin=rec;moved=false;sx=e.clientX;sy=e.clientY;try{el.setPointerCapture(e.pointerId)}catch(_){}}); 
  el.addEventListener('pointermove',e=>{if(activePin!==rec||pinching||item.locked)return;if(!moved&&Math.hypot(e.clientX-sx,e.clientY-sy)<6)return;moved=true;el.classList.add('dragging');const r=vp.getBoundingClientRect();item.x=clamp((e.clientX-r.left-tx)/s,0,IMG_W);item.y=clamp((e.clientY-r.top-ty)/s,0,IMG_H);place(rec);});
  const up=e=>{if(activePin!==rec)return;activePin=null;el.classList.remove('dragging');if(moved)save();else openEditor(rec);};
  el.addEventListener('pointerup',up);el.addEventListener('pointercancel',()=>{if(activePin!==rec)return;activePin=null;el.classList.remove('dragging');if(moved)save();});
  return rec;
}
function renderPins(){clearPins();CATDEF.forEach(c=>{if(show[c.k])arrOf(c.k).filter(it=>it.onMap!==false).forEach(it=>makePin(it,c.k));});layoutPins();}
function renderAll(){renderPins();renderList();renderLayers();}

/* ---- list sheet ---- */
const listBody=document.getElementById('listBody');
function renderList(){
  let total=0;
  listBody.innerHTML='';
  const mk=(item,c)=>{const el=document.createElement('div');el.className='chip';
    el.innerHTML='<span class="pdot" style="background:'+c.dot+'"></span><span class="nm"></span><span class="go">tap to place ▸</span><button class="chipDel" title="Delete forever">×</button>';
    el.querySelector('.nm').textContent=item.name;
    el.querySelector('.chipDel').onclick=(ev)=>{ev.stopPropagation();if(confirm('Delete "'+item.name+'" permanently?')){const arr=arrOf(c.k);const idx=arr.indexOf(item);if(idx>=0)arr.splice(idx,1);if(placingItem&&placingItem.item===item){placingItem=null;hidePlacingBanner();}renderList();save();toast('Deleted');}};
    el.onclick=()=>{closeSheets();startPlacing(item,c.k,false);};
    return el;};
  CATDEF.forEach(c=>{
    const items=arrOf(c.k).filter(it=>it.onMap===false);
    if(!items.length)return; total+=items.length;
    const h=document.createElement('div');h.className='sec';h.textContent=c.label;listBody.appendChild(h);
    items.forEach(it=>listBody.appendChild(mk(it,c)));
  });
  document.getElementById('listCount').textContent=total;
  const bg=document.getElementById('listBadge');bg.textContent=total||'';bg.style.display=total?'inline-block':'none';
  if(!total)listBody.innerHTML='<div class="empty">Everything is placed ✓</div>';
}

const layersBody=document.getElementById('layersBody');

const editor=document.getElementById('editor'),backdrop=document.getElementById('backdrop'),edName=document.getElementById('edName');
let editRec=null;
function openEditor(rec){editRec=rec;edName.value=rec.item.name;
  document.getElementById('edTitle').textContent=(CATBY[rec.kind].label).replace(/s$/,'')+' name';

const listSheet=document.getElementById('listSheet'),menuSheet=document.getElementById('menuSheet'),addSheet=document.getElementById('addSheet'),layersSheet=document.getElementById('layersSheet');
function closeSheets(){[listSheet,menuSheet,addSheet,layersSheet].forEach(s=>s.classList.remove('open'));}

/* ---- placing mode (tap-to-place) ---- */
let placingItem=null;
const placingBanner=document.getElementById('placingBanner');
placingBanner.querySelector('.pcancel').onclick=()=>cancelPlacing();
function startPlacing(item,kind,isNew){placingItem={item,kind,isNew:!!isNew};placingBanner.querySelector('.ptxt').textContent='Tap on the map to place "'+item.name+'"';placingBanner.classList.add('show');vp.classList.add('placing');closeSheets();}
function hidePlacingBanner(){placingBanner.classList.remove('show');vp.classList.remove('placing');}
function cancelPlacing(){if(!placingItem)return;if(placingItem.isNew&&placingItem.item.onMap===false){const arr=arrOf(placingItem.kind);const idx=arr.indexOf(placingItem.item);if(idx>=0)arr.splice(idx,1);}placingItem=null;hidePlacingBanner();renderList();save();toast('Cancelled');}
function placeAt(clientX,clientY){if(!placingItem)return;const r=vp.getBoundingClientRect();const item=placingItem.item;item.x=clamp((clientX-r.left-tx)/s,0,IMG_W);item.y=clamp((clientY-r.top-ty)/s,0,IMG_H);item.onMap=true;const wasNew=placingItem.isNew;placingItem=null;hidePlacingBanner();renderAll();save();const rec=pinEls.find(p=>p.item===item);if(rec&&wasNew)openEditor(rec);else toast('Placed');}

CATDEF.forEach(c=>{const el=document.getElementById('a_'+c.k);if(el)el.onclick=()=>{const it={name:c.def,x:null,y:null,onMap:false,locked:false};arrOf(c.k).push(it);renderList();save();startPlacing(it,c.k,true);};});

/* ---- Download HTML (standalone snapshot with current data baked in) ---- */
document.getElementById('mHtml').onclick=async()=>{
  try{
    closeSheets();toast('Building HTML...');
    // Fetch the current page source
    const resp = await fetch(window.location.href, {cache:'no-store'});
    if(!resp.ok){toast('Failed to fetch source');return;}
    let html = await resp.text();
    // Replace the NEW_DATA constant with current state so opening the file shows current pins
    const newDataStr = 'const NEW_DATA = '+JSON.stringify(state)+';';
    const re = /const NEW_DATA\s*=\s*\{[\s\S]*?\};/;
    if(re.test(html)){
      html = html.replace(re, newDataStr);
    } else {
      toast('NEW_DATA marker missing');return;
    }
    // Bump LS so the downloaded copy ignores any cached browser data on first open
    html = html.replace(/LS\s*=\s*"caesar_map_v\d+"/, 'LS="caesar_map_snapshot_'+Date.now()+'"');
    const ts = new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
    dl(new Blob([html],{type:'text/html;charset=utf-8'}), 'caesar_map_'+ts+'.html');
    toast('HTML downloaded');
  }catch(e){console.error(e);toast('Download failed');}
};

  if(typeof XLSX==='undefined'){toast('Excel library loading — try again in 2s');return;}
  const wb=XLSX.utils.book_new();
  const ts=new Date().toISOString().slice(0,19).replace('T',' ');

  // Summary sheet
  let totalPlaced=0,totalUnplaced=0,totalAll=0;
  const summaryRows=[
    ['Caesar Resort — Pool & Building Map Export'],
    ['Generated:',ts],
    [''],
    ['Category','Label','Color','Placed on map','Unplaced','Total'],
  ];
  CATDEF.forEach(c=>{
    const arr=arrOf(c.k);
    const placed=arr.filter(it=>it.onMap).length;
    const un=arr.length-placed;
    totalPlaced+=placed;totalUnplaced+=un;totalAll+=arr.length;
    summaryRows.push([c.k,c.label,c.dot,placed,un,arr.length]);
  });
  summaryRows.push(['']);
  summaryRows.push(['TOTAL','',`${CATDEF.length} categories`,totalPlaced,totalUnplaced,totalAll]);
  const wsSum=XLSX.utils.aoa_to_sheet(summaryRows);
  wsSum['!cols']=[{wch:14},{wch:28},{wch:12},{wch:16},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,wsSum,'Summary');

  // One sheet per category
  CATDEF.forEach(c=>{
    const arr=arrOf(c.k);
    const rows=[['#','Name','Status','X position','Y position','Locked','Category','Color']];
    arr.forEach((it,i)=>{
      rows.push([
        i+1,
        it.name,
        it.onMap?'Placed':'Unplaced',
        it.onMap&&typeof it.x==='number'?+it.x.toFixed(2):'',
        it.onMap&&typeof it.y==='number'?+it.y.toFixed(2):'',
        it.locked?'Yes':'No',
        c.label,
        c.dot,
      ]);
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:5},{wch:28},{wch:11},{wch:12},{wch:12},{wch:8},{wch:22},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,c.label.slice(0,30));
  });

  // Combined "All items" sheet
  const allRows=[['#','Category','Name','Status','X','Y','Locked','Image dimensions']];
  let n=1;
  CATDEF.forEach(c=>{
    arrOf(c.k).forEach(it=>{
      allRows.push([n++,c.label,it.name,it.onMap?'Placed':'Unplaced',
        it.onMap&&typeof it.x==='number'?+it.x.toFixed(2):'',
        it.onMap&&typeof it.y==='number'?+it.y.toFixed(2):'',
        it.locked?'Yes':'No',
        `${state.imgW||IMG_W}x${state.imgH||1024}`]);
    });
  });
  const wsAll=XLSX.utils.aoa_to_sheet(allRows);
  wsAll['!cols']=[{wch:5},{wch:18},{wch:28},{wch:11},{wch:10},{wch:10},{wch:8},{wch:18}];
  XLSX.utils.book_append_sheet(wb,wsAll,'All Items');

  XLSX.writeFile(wb,'caesar_resort_map_'+ts.replace(/[: ]/g,'-')+'.xlsx');
  closeSheets();toast('Excel exported');
};

/* ---- CSV export (single file, all categories together) ---- */
document.getElementById('mCsv').onclick=()=>{
  const rows=[['Category','Name','Status','X','Y','Locked','Color']];
  CATDEF.forEach(c=>{
    arrOf(c.k).forEach(it=>{
      rows.push([
        c.label,
        it.name,
        it.onMap?'Placed':'Unplaced',
        it.onMap&&typeof it.x==='number'?it.x.toFixed(2):'',
        it.onMap&&typeof it.y==='number'?it.y.toFixed(2):'',
        it.locked?'Yes':'No',
        c.dot,
      ]);
    });
  });
  const csv=rows.map(r=>r.map(v=>{
    const s=String(v??'');
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\r\n');
  // Add BOM for Excel UTF-8 recognition
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  dl(blob,'caesar_resort_map.csv');
  closeSheets();toast('CSV exported');
};
document.getElementById('mImport').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);if(!o||typeof o!=='object'||(!Array.isArray(o.pools)&&!Array.isArray(o.buildings))){toast('Invalid file structure');return;}['pools','buildings','fnb','office','facility'].forEach(k=>{if(Array.isArray(o[k]))o[k]=o[k].filter(it=>it&&typeof it==='object'&&typeof it.name==='string').map(it=>({name:String(it.name),x:typeof it.x==='number'?it.x:null,y:typeof it.y==='number'?it.y:null,onMap:!!it.onMap&&typeof it.x==='number'&&typeof it.y==='number',locked:!!it.locked}));});state=norm(o);renderAll();save();closeSheets();fitContent();toast('Loaded');}catch(e){toast('Invalid file');}};r.readAsText(f);this.value='';};
document.getElementById('mReset').onclick=()=>{if(confirm('Reset all names and positions to the original?')){placingItem=null;hidePlacingBanner();state=norm(def());show={pool:true,bld:true,fnb:true,office:true,facility:true};renderAll();save();fitContent();closeSheets();toast('Reset done');}};
document.getElementById('mPng').onclick=()=>{
  const img=document.getElementById('baseimg');const cw=img.naturalWidth,ch=img.naturalHeight,k=cw/IMG_W;
  const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;const g=cv.getContext('2d');
  g.drawImage(img,0,0,cw,ch);g.textBaseline='middle';g.lineJoin='round';
  const FS=22,pad=7,dotR=8;
  function dp(it,c){const x=it.x*k,y=it.y*k;g.font='600 '+FS+'px ui-sans-serif,Segoe UI,Roboto,sans-serif';
    const tw=g.measureText(it.name).width,bx=x+13,by=y-(FS/2+pad),bw=tw+pad*2,bh=FS+pad*2;
    g.beginPath();g.arc(x,y,dotR,0,Math.PI*2);g.fillStyle=c.dot;g.fill();g.lineWidth=2.5;g.strokeStyle='#fff';g.stroke();
    rr(g,bx,by,bw,bh,8);g.fillStyle=c.box;g.fill();g.lineWidth=1.6;g.strokeStyle='rgba(255,255,255,.65)';g.stroke();
    g.fillStyle='#fff';g.fillText(it.name,bx+pad,by+bh/2+1);}
  CATDEF.forEach(c=>{if(show[c.k])arrOf(c.k).filter(it=>it.onMap!==false).forEach(it=>dp(it,c));});
  cv.toBlob(b=>{dl(b,'caesar_map.png');closeSheets();toast('PNG exported');},'image/png');
};
function rr(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}

/* ---- utils ---- */
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),3000);}
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1700);}

/* ---- theme ---- */
(function(){const tBtn=document.getElementById('themeBtn');const saved=localStorage.getItem('caesar_theme');if(saved==='dark')document.body.classList.add('dark');tBtn.textContent=document.body.classList.contains('dark')?'☀':'☾';tBtn.onclick=()=>{document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');tBtn.textContent=d?'☀':'☾';localStorage.setItem('caesar_theme',d?'dark':'light');};})();

/* ---- boot ---- */
const bi=document.getElementById('baseimg');
function boot(){renderAll();fitContent();}
if(bi.complete)boot();else bi.onload=boot;
window.addEventListener('resize',()=>{layoutPins();});
</script>
